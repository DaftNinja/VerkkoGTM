<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GTM + LinkedIn Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-4xl font-bold text-slate-100 mb-3">GTM + LinkedIn Setup</h1>
    <p class="text-slate-300 text-lg mb-8">6 phases • 33 tasks • Production ready</p>
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="p-6 bg-slate-800/50 rounded-lg"><div class="text-4xl font-bold text-blue-400">33</div><div class="text-sm text-slate-400">Tasks</div></div>
      <div class="p-6 bg-slate-800/50 rounded-lg"><div class="text-4xl font-bold text-purple-400">6</div><div class="text-sm text-slate-400">Phases</div></div>
      <div class="p-6 bg-slate-800/50 rounded-lg"><div class="text-4xl font-bold text-cyan-400">4</div><div class="text-sm text-slate-400">Conversions</div></div>
    </div>
    <button onclick="testAPI()" class="px-6 py-3 bg-blue-500 text-white rounded">Test Backend</button>
    <p id="result" class="text-slate-400 mt-3"></p>
  </div>
  <script>
    async function testAPI() {
      try {
        const r = await fetch('/api/health');
        const d = await r.json();
        document.getElementById('result').textContent = '✅ Connected: ' + d.status;
        document.getElementById('result').className = 'text-green-400 mt-3';
      } catch (e) {
        document.getElementById('result').textContent = '❌ Error: ' + e.message;
        document.getElementById('result').className = 'text-red-400 mt-3';
      }
    }
    window.addEventListener('load', testAPI);
  </script>
</body>
</html>
